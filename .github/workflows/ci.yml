name: Zahlen CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Resolves LuaJIT, Jolt, and GLFW externals

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Builder Stage and Run Tests
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder # Runs compilation and 'ctest' internally
          tags: zahlen:ci-temp
          outputs: type=cacheonly # Cache intermediate layers without publishing

      - name: Build and Package Runtime Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner # Packages the final, lightweight runtime container
          tags: zahlen:latest
          load: true # Loads the image locally for inspection or push targets
